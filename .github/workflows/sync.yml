name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS objects
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub with Xet support
        run: pip install huggingface_hub hf_xet

      - name: Clear existing files and Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi, list_repo_files

          api = HfApi()
          repo_id = "mcikalmerdeka/samolet-apart-prediction"
          token = os.environ["HF_TOKEN"]

          # Step 1: Delete all existing files to free up space
          print("Checking existing files...")
          try:
              existing_files = list(list_repo_files(repo_id, repo_type="space", token=token))
              if existing_files:
                  print(f"Found {len(existing_files)} existing files. Deleting...")
                  # Delete files one by one
                  for idx, file_path in enumerate(existing_files):
                      try:
                          api.delete_file(repo_id, path_in_repo=file_path, repo_type="space", token=token)
                          if (idx + 1) % 10 == 0:
                              print(f"Deleted {idx + 1}/{len(existing_files)} files...")
                      except Exception as e:
                          print(f"Warning: Could not delete {file_path}: {e}")
                  print("Existing files cleared.")
              else:
                  print("No existing files found.")
          except Exception as e:
              print(f"Warning: Could not list/delete existing files: {e}")
              print("Proceeding with upload anyway...")

          # Step 2: Upload new files
          print("Uploading files...")
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              token=token,
              ignore_patterns=[
                  ".git/*",
                  ".gitignore",
                  ".gitattributes",
                  ".github/*",
                  ".venv/*",
                  "venv/*",
                  "__pycache__/*",
                  "*.py[oc]",
                  ".env",
                  ".env.*",
                  "output/*",
                  "models/*.pt",
                  "*.ipynb",
                  "notebook.ipynb",
                  "Study.pdf",
                  "uv.lock",
                  "*.log",
                  "tests/*",
                  ".pytest_cache/*",
                  ".coverage",
                  "htmlcov/*",
                  "dist/*",
                  "build/*",
                  "*.egg-info/*",
              ],
          )
          print("Successfully synced to Hugging Face Space.")
          EOF
